<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320">
  <!-- Casa: telhado triangular + corpo retangular -->
  <polygon points="140,18 258,118 220,118 220,230 60,230 60,118 22,118" fill="#1a2a1a"/>

  <!-- Arco/swoosh sobre a casa -->
  <path d="M52 230 C72 172 128 104 210 52 C224 82 208 116 184 138 C164 156 140 176 116 198 C98 212 74 226 52 230 Z"
    fill="#1e3a1e" opacity="0.8"/>

  <!-- Caule das folhas -->
  <path d="M108 80 C102 58 96 38 104 16" stroke="#22c55e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Folha esquerda grande -->
  <path d="M104 16 C82 8 62 20 68 42 C80 36 96 28 104 16 Z" fill="#22c55e"/>
  <path d="M104 16 C86 24 72 36 68 42" stroke="#16a34a" stroke-width="1" fill="none"/>

  <!-- Folha direita grande -->
  <path d="M104 16 C118 4 140 10 138 32 C124 28 112 20 104 16 Z" fill="#16a34a"/>
  <path d="M104 16 C120 20 132 28 138 32" stroke="#15803d" stroke-width="1" fill="none"/>

  <!-- Folhinhas menores topo -->
  <path d="M104 16 C90 2 72 6 74 22 C86 18 98 14 104 16 Z" fill="#4ade80"/>
  <path d="M104 16 C114 2 132 0 134 16 C122 14 112 12 104 16 Z" fill="#4ade80"/>

  <!-- GREEN VILLAGE -->
  <text x="140" y="264" text-anchor="middle"
    font-family="Arial Black,'Helvetica Neue',Arial,sans-serif"
    font-size="28" font-weight="900" fill="#2d7a2d" letter-spacing="1.5">GREEN VILLAGE</text>

  <!-- MOBILE HOMES -->
  <text x="140" y="290" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="11.5" fill="#4a7a4a" letter-spacing="6">MOBILE HOMES</text>
</svg>
