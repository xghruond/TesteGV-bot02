<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" width="520" height="480">
  <defs>
    <linearGradient id="gvGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CC938"/>
      <stop offset="100%" stop-color="#3BA52E"/>
    </linearGradient>
  </defs>

  <!-- === CASA === -->
  <!-- Parede esquerda -->
  <path d="M135,225 L135,310 L255,310 L255,225" fill="url(#gvGreen)"/>
  <!-- Telhado -->
  <path d="M105,228 L195,148 L285,228 Z" fill="url(#gvGreen)"/>
  <!-- Chaminé -->
  <rect x="248" y="170" width="22" height="42" rx="2" fill="url(#gvGreen)"/>

  <!-- === FOLHA GRANDE CURVADA === -->
  <!-- A folha swoosh que cruza a casa da esq-baixo para dir-cima -->
  <path d="
    M118,322
    C118,322 140,280 170,255
    C200,230 240,218 280,212
    C320,206 350,210 350,210
    C350,210 320,235 285,252
    C250,269 215,278 180,290
    C145,305 118,322 118,322
    Z" fill="url(#gvGreen)"/>

  <!-- Ponta inferior da folha (cauda curvada) -->
  <path d="
    M118,322
    C112,332 108,345 118,350
    C128,355 138,345 140,335
    C135,330 125,325 118,322
    Z" fill="url(#gvGreen)"/>

  <!-- Nervura central da folha -->
  <path d="M125,318 Q180,270 260,230 Q310,215 345,212"
    stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>

  <!-- === FOLHA PEQUENA SUPERIOR === -->
  <!-- Caule -->
  <path d="M268,160 C265,145 270,132 278,125"
    stroke="url(#gvGreen)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Folha direita -->
  <path d="
    M278,125
    C295,108 330,102 350,108
    C360,112 365,125 358,140
    C350,155 325,162 305,160
    C285,158 278,150 278,125
    Z" fill="url(#gvGreen)"/>

  <!-- Folhinha esquerda pequena -->
  <path d="
    M278,125
    C268,112 260,100 265,88
    C270,78 282,78 290,85
    C296,92 290,108 278,125
    Z" fill="url(#gvGreen)"/>

  <!-- Nervura folha pequena -->
  <path d="M280,127 Q310,115 348,118"
    stroke="rgba(255,255,255,0.12)" stroke-width="1.5" fill="none"/>

  <!-- === TEXTO === -->
  <text x="260" y="385" text-anchor="middle"
    font-family="'Arial Black','Segoe UI Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900" font-size="54" fill="#4CC938" letter-spacing="3">
    GREEN VILLAGE
  </text>

  <text x="260" y="425" text-anchor="middle"
    font-family="'Arial','Helvetica Neue','Segoe UI',sans-serif"
    font-weight="600" font-size="24" fill="#4CC938" letter-spacing="10">
    MOBILE HOMES
  </text>
</svg>