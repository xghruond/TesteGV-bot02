<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green BOT - Criação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d'
            },
            dark: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              850: '#172033',
              900: '#0f172a',
              950: '#020617'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // Detecta se Tailwind carregou; se não, ativa fallback CSS
    window.addEventListener('DOMContentLoaded', function() {
      if (typeof tailwind === 'undefined') {
        document.documentElement.classList.add('no-tailwind');
      }
    });
  </script>
</head>
<body class="min-h-screen font-sans antialiased text-gray-100 bg-nature">

  <!-- Abertura Green Village -->
  <div id="splash-screen">
    <div class="splash-glow"></div>
    <div id="splash-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360">
        <!-- Casa -->
        <path d="M160 14 L280 118 H242 V238 H78 V118 H40 Z" fill="#22c55e"/>
        <!-- Swoosh diagonal (folha branca) -->
        <path d="M64 238 C88 178,148 102,228 42 C244 78,226 116,198 140 C178 158,155 178,130 200 C112 216,86 232,64 238 Z" fill="white" opacity="0.90"/>
        <!-- Nervura -->
        <path d="M68 234 C152 134 224 46" stroke="rgba(34,197,94,0.4)" stroke-width="1.5" fill="none"/>
        <!-- Brotos topo direito -->
        <path d="M228 42 C236 20 258 24 253 46 C240 43 228 42 Z" fill="#22c55e"/>
        <path d="M240 52 C256 28 278 42 268 60 C254 56 240 52 Z" fill="#22c55e"/>
        <path d="M250 34 C254 16 272 18 268 36 C258 34 250 34 Z" fill="#4ade80"/>
        <!-- GREEN VILLAGE -->
        <text x="160" y="283" text-anchor="middle"
          font-family="Arial Black,'Helvetica Neue',sans-serif"
          font-size="33" font-weight="900" fill="white" letter-spacing="1">GREEN VILLAGE</text>
        <!-- MOBILE HOMES -->
        <text x="160" y="312" text-anchor="middle"
          font-family="Arial,Helvetica,sans-serif"
          font-size="13" fill="rgba(255,255,255,0.65)" letter-spacing="7">MOBILE HOMES</text>
      </svg>
    </div>
    <p class="splash-skip">clique para pular</p>
  </div>

  <div id="bg-forest"></div>
  <div class="bg-overlay"></div>
  <div id="forest-foliage"></div>
  <canvas id="particle-canvas"></canvas>
  <header id="app-header" class="relative z-10"></header>
  <main id="app-content" class="container mx-auto px-4 py-8 relative z-10"></main>
  <div id="app-checklist" class="relative z-10"></div>

  <script src="js/data.js?v=56"></script>
  <script src="js/storage.js?v=56"></script>
  <script src="js/particles.js?v=56"></script>
  <script src="js/components/header.js?v=56"></script>
  <script src="js/components/form.js?v=56"></script>
  <script src="js/components/platform-card.js?v=56"></script>
  <script src="js/components/guide-viewer.js?v=56"></script>
  <script src="js/components/checklist.js?v=56"></script>
  <script src="js/components/wizard.js?v=56"></script>
  <script src="js/components/summary.js?v=56"></script>
  <script src="js/components/twilio.js?v=56"></script>
  <script src="js/app.js?v=56"></script>
</body>
</html>
