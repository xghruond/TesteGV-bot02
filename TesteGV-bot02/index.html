<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green BOT - Criação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d'
            },
            dark: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              850: '#172033',
              900: '#0f172a',
              950: '#020617'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // Detecta se Tailwind carregou; se não, ativa fallback CSS
    window.addEventListener('DOMContentLoaded', function() {
      if (typeof tailwind === 'undefined') {
        document.documentElement.classList.add('no-tailwind');
      }
    });
  </script>
</head>
<body class="min-h-screen font-sans antialiased text-gray-100 bg-nature">

  <!-- Abertura Green Village -->
  <div id="splash-screen">
    <div class="splash-glow"></div>
    <div id="splash-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320">
        <!-- Casa: telhado + corpo -->
        <polygon points="140,18 258,118 220,118 220,230 60,230 60,118 22,118" fill="#1a2a1a"/>

        <!-- Arco/swoosh sobre a casa (folha larga diagonal) -->
        <path d="M52 230 C72 172 128 104 210 52 C224 82 208 116 184 138 C164 156 140 176 116 198 C98 212 74 226 52 230 Z"
          fill="#1e3a1e" opacity="0.85"/>

        <!-- Caule principal das folhas (nasce do centro-esquerdo do telhado) -->
        <path d="M108 80 C102 58 96 38 104 16" stroke="#22c55e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

        <!-- Folha esquerda grande -->
        <path d="M104 16 C82 8 62 20 68 42 C80 36 96 28 104 16 Z" fill="#22c55e"/>
        <!-- Nervura folha esquerda -->
        <path d="M104 16 C86 24 72 36 68 42" stroke="#16a34a" stroke-width="1" fill="none"/>

        <!-- Folha direita grande -->
        <path d="M104 16 C118 4 140 10 138 32 C124 28 112 20 104 16 Z" fill="#16a34a"/>
        <!-- Nervura folha direita -->
        <path d="M104 16 C120 20 132 28 138 32" stroke="#15803d" stroke-width="1" fill="none"/>

        <!-- Folhinha topo esquerda menor -->
        <path d="M104 16 C90 2 72 6 74 22 C86 18 98 14 104 16 Z" fill="#4ade80"/>

        <!-- Folhinha topo direita menor -->
        <path d="M104 16 C114 2 132 0 134 16 C122 14 112 12 104 16 Z" fill="#4ade80"/>

        <!-- Texto GREEN VILLAGE -->
        <text x="140" y="264"
          text-anchor="middle"
          font-family="Arial Black,'Helvetica Neue',Arial,sans-serif"
          font-size="28" font-weight="900"
          fill="#22c55e" letter-spacing="1.5">GREEN VILLAGE</text>

        <!-- Texto MOBILE HOMES -->
        <text x="140" y="290"
          text-anchor="middle"
          font-family="Arial,Helvetica,sans-serif"
          font-size="11.5" fill="rgba(255,255,255,0.55)" letter-spacing="6">MOBILE HOMES</text>
      </svg>
    </div>
    <p class="splash-skip">clique para pular</p>
  </div>

  <div id="bg-forest"></div>
  <div class="bg-overlay"></div>
  <div id="forest-foliage"></div>
  <canvas id="particle-canvas"></canvas>
  <header id="app-header" class="relative z-10"></header>
  <main id="app-content" class="container mx-auto px-4 py-8 relative z-10"></main>
  <div id="app-checklist" class="relative z-10"></div>

  <script src="js/data.js?v=57"></script>
  <script src="js/storage.js?v=57"></script>
  <script src="js/particles.js?v=57"></script>
  <script src="js/components/header.js?v=57"></script>
  <script src="js/components/form.js?v=57"></script>
  <script src="js/components/platform-card.js?v=57"></script>
  <script src="js/components/guide-viewer.js?v=57"></script>
  <script src="js/components/checklist.js?v=57"></script>
  <script src="js/components/wizard.js?v=57"></script>
  <script src="js/components/summary.js?v=57"></script>
  <script src="js/components/twilio.js?v=57"></script>
  <script src="js/app.js?v=57"></script>
</body>
</html>
