<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green BOT - Criação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d'
            },
            dark: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              850: '#172033',
              900: '#0f172a',
              950: '#020617'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // Detecta se Tailwind carregou; se não, ativa fallback CSS
    window.addEventListener('DOMContentLoaded', function() {
      if (typeof tailwind === 'undefined') {
        document.documentElement.classList.add('no-tailwind');
      }
    });
  </script>
</head>
<body class="min-h-screen font-sans antialiased text-gray-100 bg-nature">
  <div id="bg-forest"></div>
  <div class="bg-overlay"></div>
  <div id="forest-foliage"></div>
  <canvas id="particle-canvas"></canvas>
  <header id="app-header" class="relative z-10"></header>
  <main id="app-content" class="container mx-auto px-4 py-8 relative z-10"></main>
  <div id="app-checklist" class="relative z-10"></div>

  <script src="js/data.js?v=54"></script>
  <script src="js/storage.js?v=54"></script>
  <script src="js/particles.js?v=54"></script>
  <script src="js/components/header.js?v=54"></script>
  <script src="js/components/form.js?v=54"></script>
  <script src="js/components/platform-card.js?v=54"></script>
  <script src="js/components/guide-viewer.js?v=54"></script>
  <script src="js/components/checklist.js?v=54"></script>
  <script src="js/components/wizard.js?v=54"></script>
  <script src="js/components/summary.js?v=54"></script>
  <script src="js/components/twilio.js?v=54"></script>
  <script src="js/app.js?v=54"></script>
</body>
</html>
