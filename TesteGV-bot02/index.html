<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green BOT - Criação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d'
            },
            dark: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              850: '#172033',
              900: '#0f172a',
              950: '#020617'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // Detecta se Tailwind carregou; se não, ativa fallback CSS
    window.addEventListener('DOMContentLoaded', function() {
      if (typeof tailwind === 'undefined') {
        document.documentElement.classList.add('no-tailwind');
      }
    });
  </script>
</head>
<body class="min-h-screen font-sans antialiased text-gray-100 bg-nature">

  <!-- Abertura Green Village -->
  <div id="splash-screen">
    <div class="splash-glow"></div>
    <div id="splash-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340">

        <!-- Casa principal: telhado agudo + corpo -->
        <polygon points="150,22 272,122 232,122 232,236 68,236 68,122 28,122" fill="#14291a"/>

        <!-- Swoosh branco diagonal (folha larga — de baixo-esq p/ cima-dir) -->
        <path d="M58 236
          C78 180, 134 112, 218 56
          C232 86, 216 120, 190 144
          C170 162, 146 182, 122 204
          C104 220, 78 234, 58 236 Z"
          fill="white" opacity="0.88"/>

        <!-- Nervura central do swoosh -->
        <path d="M62 232 C148 136 214 60"
          stroke="rgba(20,80,30,0.3)" stroke-width="1.5" fill="none"/>

        <!-- PLANTA — nasce do pico do telhado (150, 22) -->
        <!-- Caule -->
        <line x1="150" y1="22" x2="150" y2="2" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>

        <!-- Folha central (aponta para cima) -->
        <path d="M150 2
          C140 -10, 126 -8, 128 6
          C134 4, 143 2, 150 2 Z" fill="#4ade80"/>
        <path d="M150 2
          C160 -10, 174 -8, 172 6
          C166 4, 157 2, 150 2 Z" fill="#22c55e"/>

        <!-- Folha esquerda -->
        <path d="M148 8
          C136 0, 118 4, 120 18
          C130 14, 140 10, 148 8 Z" fill="#22c55e"/>
        <path d="M148 8 C134 10, 122 16, 120 18" stroke="#16a34a" stroke-width="0.8" fill="none"/>

        <!-- Folha direita -->
        <path d="M152 8
          C164 0, 182 4, 180 18
          C170 14, 160 10, 152 8 Z" fill="#16a34a"/>
        <path d="M152 8 C166 10, 178 16, 180 18" stroke="#15803d" stroke-width="0.8" fill="none"/>

        <!-- Texto GREEN VILLAGE -->
        <text x="150" y="272"
          text-anchor="middle"
          font-family="Arial Black,'Helvetica Neue',Arial,sans-serif"
          font-size="30" font-weight="900"
          fill="#22c55e" letter-spacing="1">GREEN VILLAGE</text>

        <!-- Texto MOBILE HOMES -->
        <text x="150" y="300"
          text-anchor="middle"
          font-family="Arial,Helvetica,sans-serif"
          font-size="12" fill="rgba(255,255,255,0.5)" letter-spacing="6.5">MOBILE HOMES</text>
      </svg>
    </div>
    <p class="splash-skip">clique para pular</p>
  </div>

  <div id="bg-forest"></div>
  <div class="bg-overlay"></div>
  <div id="forest-foliage"></div>
  <canvas id="particle-canvas"></canvas>
  <header id="app-header" class="relative z-10"></header>
  <main id="app-content" class="container mx-auto px-4 py-8 relative z-10"></main>
  <div id="app-checklist" class="relative z-10"></div>

  <script src="js/data.js?v=58"></script>
  <script src="js/storage.js?v=58"></script>
  <script src="js/particles.js?v=58"></script>
  <script src="js/components/header.js?v=58"></script>
  <script src="js/components/form.js?v=58"></script>
  <script src="js/components/platform-card.js?v=58"></script>
  <script src="js/components/guide-viewer.js?v=58"></script>
  <script src="js/components/checklist.js?v=58"></script>
  <script src="js/components/wizard.js?v=58"></script>
  <script src="js/components/summary.js?v=58"></script>
  <script src="js/components/twilio.js?v=58"></script>
  <script src="js/app.js?v=58"></script>
</body>
</html>
