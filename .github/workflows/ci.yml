name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: TesteGV-bot02

jobs:
  python-tests:
    name: Python smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright (for import checks)
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Validate Python syntax (all .py)
        run: |
          python -c "
          import ast, os
          failed = []
          for dp, _, fs in os.walk('.'):
              if '.git' in dp or 'node_modules' in dp or '__pycache__' in dp:
                  continue
              for f in fs:
                  if f.endswith('.py'):
                      p = os.path.join(dp, f)
                      try:
                          ast.parse(open(p, encoding='utf-8').read())
                      except SyntaxError as e:
                          failed.append(p + ': ' + str(e))
          if failed:
              print('SYNTAX ERRORS:')
              for x in failed: print(' -', x)
              raise SystemExit(1)
          print('OK: todos os .py tem sintaxe valida')
          "

      - name: Run smoke tests
        run: python -m unittest tests.test_smoke -v

  js-syntax:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          for f in js/app.js js/data.js js/storage.js js/particles.js js/components/*.js; do
            echo "Checking $f..."
            node -c "$f" || exit 1
          done
          echo "OK: todos os JS tem sintaxe valida"

  cache-version-consistency:
    name: Cache version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar que todos os ?v= batem em index.html
        run: |
          versions=$(grep -oE '\?v=[0-9]+' index.html | sort -u)
          count=$(echo "$versions" | wc -l)
          if [ "$count" -ne 1 ]; then
            echo "ERRO: multiplas versoes de cache em index.html:"
            echo "$versions"
            exit 1
          fi
          echo "OK: cache unificado em $versions"
